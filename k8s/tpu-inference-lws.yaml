apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: vllm-multihost
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 4
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          role: leader
      spec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu7x
          cloud.google.com/gke-tpu-topology: 4x4x1
        containers:
          - name: vllm-tpu
            image: vllm/vllm-tpu:nightly-20260428-99e0d15-fd74c90
            imagePullPolicy: Always
            env:
              - name: MODEL_ACCESS_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: model-token
                    key: token
                    optional: true
              - name: RAY_CLUSTER_SIZE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['leaderworkerset.sigs.k8s.io/size']
            command:
              - bash
              - -c
              - |
                ray start --head --port=6379
                sleep 10

                python3 -m vllm.entrypoints.openai.api_server \
                  --host=0.0.0.0 \
                  --port=8000 \
                  --model=${MODEL_NAME} \
                  --tensor-parallel-size=16 \
                  --max-model-len=8192 \
                  --max-num-batched-tokens=16384 \
                  --kv-cache-dtype=fp8 \
                  --async-scheduling \
                  --gpu-memory-utilization=0.90
            ports:
              - containerPort: 8000
                name: http
              - containerPort: 6379
                name: ray
              - containerPort: 8471
              - containerPort: 8431
            resources:
              limits:
                google.com/tpu: 4
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
        tolerations:
          - operator: "Exists"
            key: google.com/tpu
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
    workerTemplate:
      metadata:
        labels:
          role: worker
      spec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu7x
          cloud.google.com/gke-tpu-topology: 4x4x1
        containers:
          - name: vllm-tpu
            image: vllm/vllm-tpu:nightly-20260428-99e0d15-fd74c90
            imagePullPolicy: Always
            env:
              - name: MODEL_ACCESS_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: model-token
                    key: token
                    optional: true
            command:
              - bash
              - -c
              - |
                LEADER_ADDR=$(echo $LWS_LEADER_ADDRESS)
                ray start --address="${LEADER_ADDR}:6379" --block
            ports:
              - containerPort: 8471
              - containerPort: 8431
            resources:
              limits:
                google.com/tpu: 4
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
        tolerations:
          - operator: "Exists"
            key: google.com/tpu
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-lws-svc
spec:
  type: ClusterIP
  selector:
    leaderworkerset.sigs.k8s.io/name: vllm-multihost
    leaderworkerset.sigs.k8s.io/worker-index: "0"
  ports:
    - name: http
      port: 8000
      targetPort: 8000
