apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-inference
  template:
    metadata:
      labels:
        app: vllm-inference
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu7x
        cloud.google.com/gke-tpu-topology: 2x2x1
      containers:
        - name: vllm-tpu
          image: vllm/vllm-tpu:nightly-20260428-99e0d15-fd74c90
          imagePullPolicy: Always
          command:
            - python3
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --host=0.0.0.0
            - --port=8000
            - --model=${MODEL_NAME}
            - --tensor-parallel-size=4
            - --max-model-len=8192
            - --max-num-batched-tokens=16384
            - --kv-cache-dtype=fp8
            - --async-scheduling
            - --gpu-memory-utilization=0.86
          env:
            - name: MODEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: model-token
                  key: token
                  optional: true
          ports:
            - containerPort: 8000
              name: http
          resources:
            limits:
              google.com/tpu: 4
            requests:
              google.com/tpu: 4
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      tolerations:
        - operator: "Exists"
          key: google.com/tpu
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference-svc
spec:
  type: ClusterIP
  selector:
    app: vllm-inference
  ports:
    - name: http
      port: 8000
      targetPort: 8000
