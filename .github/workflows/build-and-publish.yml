name: Build and Publish MaxText TPU Images

on:
  # Run weekly on Monday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      maxtext_ref:
        description: 'MaxText branch/tag/commit to build from'
        required: false
        default: 'main'
      mode:
        description: 'JAX version mode'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - nightly
      build_pretraining:
        description: 'Build pre-training image'
        required: false
        default: true
        type: boolean
      build_posttraining:
        description: 'Build post-training image'
        required: false
        default: true
        type: boolean

env:
  DOCKERHUB_REPO: sanjeevrg
  MAXTEXT_REF: ${{ github.event.inputs.maxtext_ref || 'main' }}
  MODE: ${{ github.event.inputs.mode || 'stable' }}

jobs:
  build-tpu-pretraining:
    if: ${{ github.event.inputs.build_pretraining != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Clone MaxText
        run: |
          git clone --depth 1 --branch ${{ env.MAXTEXT_REF }} \
            https://github.com/AI-hypercomputer/maxtext.git
        working-directory: /tmp

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="${{ env.DOCKERHUB_REPO }}/maxtext-tpu-pretraining"
          DATE_TAG=$(date +%Y-%m-%d)
          SHORT_SHA=$(cd /tmp/maxtext && git rev-parse --short HEAD)
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build TPU pre-training image
        working-directory: /tmp/maxtext
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg DEVICE=tpu \
            --build-arg MODE=${{ env.MODE }} \
            --build-arg WORKFLOW=pre-training \
            --build-arg PACKAGE_DIR=src \
            --build-arg INCLUDE_TEST_ASSETS=false \
            -f src/dependencies/dockerfiles/maxtext_tpu_dependencies.Dockerfile \
            -t maxtext_base_image \
            .

      - name: Build runner layer
        working-directory: /tmp/maxtext
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BASEIMAGE=maxtext_base_image \
            --build-arg PACKAGE_DIR=src \
            -f src/dependencies/dockerfiles/maxtext_runner.Dockerfile \
            -t ${{ steps.meta.outputs.image_name }}:${{ env.MODE }} \
            .

      - name: Tag and push
        run: |
          IMAGE="${{ steps.meta.outputs.image_name }}"
          docker tag "$IMAGE:${{ env.MODE }}" "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.date_tag }}"
          docker tag "$IMAGE:${{ env.MODE }}" "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.short_sha }}"
          docker push "$IMAGE:${{ env.MODE }}"
          docker push "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.date_tag }}"
          docker push "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.short_sha }}"

  build-tpu-posttraining:
    if: ${{ github.event.inputs.build_posttraining != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Clone MaxText
        run: |
          git clone --depth 1 --branch ${{ env.MAXTEXT_REF }} \
            https://github.com/AI-hypercomputer/maxtext.git
        working-directory: /tmp

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="${{ env.DOCKERHUB_REPO }}/maxtext-tpu-posttraining"
          DATE_TAG=$(date +%Y-%m-%d)
          SHORT_SHA=$(cd /tmp/maxtext && git rev-parse --short HEAD)
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build TPU post-training image
        working-directory: /tmp/maxtext
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg DEVICE=tpu \
            --build-arg MODE=${{ env.MODE }} \
            --build-arg WORKFLOW=post-training \
            --build-arg PACKAGE_DIR=src \
            --build-arg INCLUDE_TEST_ASSETS=false \
            -f src/dependencies/dockerfiles/maxtext_tpu_dependencies.Dockerfile \
            -t maxtext_base_image \
            .

      - name: Build runner layer
        working-directory: /tmp/maxtext
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BASEIMAGE=maxtext_base_image \
            --build-arg PACKAGE_DIR=src \
            -f src/dependencies/dockerfiles/maxtext_runner.Dockerfile \
            -t ${{ steps.meta.outputs.image_name }}:${{ env.MODE }} \
            .

      - name: Tag and push
        run: |
          IMAGE="${{ steps.meta.outputs.image_name }}"
          docker tag "$IMAGE:${{ env.MODE }}" "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.date_tag }}"
          docker tag "$IMAGE:${{ env.MODE }}" "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.short_sha }}"
          docker push "$IMAGE:${{ env.MODE }}"
          docker push "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.date_tag }}"
          docker push "$IMAGE:${{ env.MODE }}-${{ steps.meta.outputs.short_sha }}"
