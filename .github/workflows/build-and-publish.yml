name: Build and Publish MaxText Docker Images

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday 00:00 UTC
  workflow_dispatch:
    inputs:
      maxtext_ref:
        description: 'MaxText branch, tag, or commit SHA'
        required: false
        default: 'main'
      mode:
        description: 'JAX version mode'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - nightly

env:
  DOCKERHUB_REPO: sanjeevrg
  MAXTEXT_REF: ${{ github.event.inputs.maxtext_ref || 'main' }}
  MODE: ${{ github.event.inputs.mode || 'stable' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: tpu
            workflow: pre-training
            image: maxtext-tpu-pretraining
            dockerfile: maxtext_tpu_dependencies.Dockerfile
          - device: tpu
            workflow: post-training
            image: maxtext-tpu-posttraining
            dockerfile: maxtext_tpu_dependencies.Dockerfile
          - device: gpu
            workflow: pre-training
            image: maxtext-gpu-pretraining
            dockerfile: maxtext_gpu_dependencies.Dockerfile

    name: ${{ matrix.device }} / ${{ matrix.workflow }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h

      - name: Clone MaxText
        run: |
          git clone --depth 1 --branch ${{ env.MAXTEXT_REF }} \
            https://github.com/AI-hypercomputer/maxtext.git
        working-directory: /tmp

      - name: Patch GPU Dockerfile (upstream bug)
        if: matrix.device == 'gpu'
        working-directory: /tmp/maxtext
        run: |
          # Upstream bug: GPU Dockerfile configures NVIDIA apt repos for Ubuntu 22.04
          # but the base image ghcr.io/nvidia/jax:base has moved to Ubuntu 24.04.
          # This causes "Unable to locate package libcusparse-12-6".
          # See: https://github.com/AI-hypercomputer/maxtext/blob/main/src/dependencies/dockerfiles/maxtext_gpu_dependencies.Dockerfile#L11
          sed -i 's/ubuntu2204/ubuntu2404/g' \
            src/dependencies/dockerfiles/${{ matrix.dockerfile }}
          echo "Patched NVIDIA repo from ubuntu2204 → ubuntu2404"

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${{ env.DOCKERHUB_REPO }}/${{ matrix.image }}"
          DATE_TAG=$(date +%Y-%m-%d)
          SHORT_SHA=$(cd /tmp/maxtext && git rev-parse --short HEAD)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "date=$DATE_TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build base image
        working-directory: /tmp/maxtext
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg DEVICE=${{ matrix.device }} \
            --build-arg MODE=${{ env.MODE }} \
            --build-arg WORKFLOW=${{ matrix.workflow }} \
            --build-arg PACKAGE_DIR=src \
            --build-arg INCLUDE_TEST_ASSETS=false \
            --label org.opencontainers.image.source=https://github.com/AI-hypercomputer/maxtext \
            --label org.opencontainers.image.description="MaxText ${{ matrix.device }} ${{ matrix.workflow }} (${{ env.MODE }} JAX)" \
            --label org.opencontainers.image.revision=$(git rev-parse HEAD) \
            -f src/dependencies/dockerfiles/${{ matrix.dockerfile }} \
            -t maxtext_base_image \
            .

      - name: Build runner layer
        working-directory: /tmp/maxtext
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg BASEIMAGE=maxtext_base_image \
            --build-arg PACKAGE_DIR=src \
            -f src/dependencies/dockerfiles/maxtext_runner.Dockerfile \
            -t ${{ steps.meta.outputs.image }}:${{ env.MODE }} \
            .

      - name: Push
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ env.MODE }}"
          docker tag "$IMAGE:$TAG" "$IMAGE:$TAG-${{ steps.meta.outputs.date }}"
          docker tag "$IMAGE:$TAG" "$IMAGE:$TAG-${{ steps.meta.outputs.sha }}"
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:$TAG-${{ steps.meta.outputs.date }}"
          docker push "$IMAGE:$TAG-${{ steps.meta.outputs.sha }}"

      - name: Summary
        run: |
          echo "### ${{ matrix.device }} ${{ matrix.workflow }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ steps.meta.outputs.image }}:${{ env.MODE }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| latest | \`${{ env.MODE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| date | \`${{ env.MODE }}-${{ steps.meta.outputs.date }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| commit | \`${{ env.MODE }}-${{ steps.meta.outputs.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
